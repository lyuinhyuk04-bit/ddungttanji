name: Auto Sync Schedule

on:
  schedule:
    # Runs every 5 minutes (GitHub Actions minimum interval)
    # Note: GitHub may delay schedule execution by 10-30 minutes depending on server load.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  sync-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        run: |
          python sync_schedule.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json data.js
          # Only commit and push if there are changes to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update schedules [skip ci]" && git push)
